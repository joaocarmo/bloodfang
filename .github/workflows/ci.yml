name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and format check
        run: pnpm check

      - name: Build engine
        run: pnpm -F @bloodfang/engine build

      - name: Typecheck engine
        run: pnpm -F @bloodfang/engine typecheck

      - name: Test engine
        run: pnpm -F @bloodfang/engine test

      - name: Typecheck server
        run: pnpm -F @bloodfang/server typecheck

      - name: Test server
        run: pnpm -F @bloodfang/server test

      - name: Build server
        run: pnpm -F @bloodfang/server build

      - name: Typecheck client
        run: pnpm -F @bloodfang/client typecheck

      - name: Test client
        run: pnpm -F @bloodfang/client test

      - name: Check i18n extraction is up to date
        run: pnpm -F @bloodfang/client i18n:check

      - name: Build client
        run: pnpm -F @bloodfang/client build

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('./packages/client/node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm -F @bloodfang/client exec playwright install-deps chromium
          else
            pnpm -F @bloodfang/client e2e:install
          fi

      - name: Run e2e tests
        run: pnpm -F @bloodfang/client e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/client/playwright-report
          retention-days: 7
